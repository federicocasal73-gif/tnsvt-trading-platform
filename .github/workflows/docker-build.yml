name: docker-build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Avoid building the same image multiple times in parallel
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─── Per-service Docker build matrix ────────────────────────────────
  build:
    name: build/${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            context: apps/gateway/api-gateway
            dockerfile: Dockerfile
          - name: auth-service
            context: apps/platform/auth-service
            dockerfile: Dockerfile
          - name: user-service
            context: apps/platform/user-service
            dockerfile: Dockerfile
          - name: signal-engine
            context: apps/trading/signal-engine
            dockerfile: Dockerfile
          - name: execution-engine
            context: apps/trading/execution-engine
            dockerfile: Dockerfile
          - name: copy-trading
            context: apps/trading/copy-trading
            dockerfile: Dockerfile
          - name: risk-engine
            context: apps/risk/risk-engine
            dockerfile: Dockerfile
          - name: audit-engine
            context: apps/audit/audit-engine
            dockerfile: Dockerfile
          - name: price-feed
            context: apps/market-data/price-feed
            dockerfile: Dockerfile
          - name: telegram-bot-service
            context: apps/notification/telegram-bot-service
            dockerfile: Dockerfile
          - name: ai-core
            context: apps/ai/ai-core
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${TAG}" >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

  # ─── Integration: ensure full stack still builds ───────────────────
  compose-validate:
    name: compose/validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config --quiet