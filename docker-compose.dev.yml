version: "3.9"

# ═══════════════════════════════════════════════════════════════
# TNSVT V2 - Docker Compose para desarrollo
# Fase 1 (MVP) - 17 servicios
# ═══════════════════════════════════════════════════════════════

x-restart-policy: &restart_policy
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ───────────────────────────────────────────────────────────────
# RED
# ───────────────────────────────────────────────────────────────
networks:
  tnsvt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ───────────────────────────────────────────────────────────────
# VOLUMENES
# ───────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  nats-data:
  ollama-data:
  prometheus-data:
  grafana-data:
  traefik-letsencrypt:

# ═══════════════════════════════════════════════════════════════
# SERVICIOS DE INFRAESTRUCTURA
# ═══════════════════════════════════════════════════════════════

# ─── PostgreSQL 16 + TimescaleDB ────────────────────────────────
services:
  postgres:
    <<: *restart_policy
    <<: *logging
    image: timescale/timescaledb:latest-pg16
    container_name: tnsvt-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tnsvt}
      POSTGRES_USER: ${POSTGRES_USER:-tnsvt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tnsvt}
      TS_TUNE_MEMORY: 2GB
      TS_TUNE_NUM_CPUS: 2
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - tnsvt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tnsvt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7+ ───────────────────────────────────────────────
  redis:
    <<: *restart_policy
    <<: *logging
    image: redis:7-alpine
    container_name: tnsvt-redis
    hostname: redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - tnsvt-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── NATS + JetStream ───────────────────────────────────────
  nats:
    <<: *restart_policy
    <<: *logging
    image: nats:2.10-alpine
    container_name: tnsvt-nats
    hostname: nats
    command: >
      --name=tnsvt-nats
      --http_port=8222
      --cluster_name=${NATS_CLUSTER_NAME:-tnsvt-cluster}
      --jetstream
      --store_dir=/data/jetstream
      --max_payload=${NATS_MAX_PAYLOAD:-10MB}
      --log_level=info
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    networks:
      - tnsvt-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (LLM self-hosted) ───────────────────────────────
  ollama:
    <<: *restart_policy
    <<: *logging
    image: ollama/ollama:latest
    container_name: tnsvt-ollama
    hostname: ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - tnsvt-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── Traefik (API Gateway + Reverse Proxy) ──────────────────
  traefik:
    <<: *restart_policy
    <<: *logging
    image: traefik:v3.0
    container_name: tnsvt-traefik
    hostname: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=tnsvt-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      - "--accesslog=true"
      - "--accesslog.fields.headers.names=X-Forwarded-For,X-Real-IP,User-Agent"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - tnsvt-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

# ═══════════════════════════════════════════════════════════════
# OBSERVABILIDAD
# ═══════════════════════════════════════════════════════════════

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    <<: *restart_policy
    <<: *logging
    image: prom/prometheus:latest
    container_name: tnsvt-prometheus
    hostname: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    networks:
      - tnsvt-network
    depends_on:
      - traefik

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    <<: *restart_policy
    <<: *logging
    image: grafana/grafana:latest
    container_name: tnsvt-grafana
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - tnsvt-network
    depends_on:
      - prometheus

# ═══════════════════════════════════════════════════════════════
# PLACEHOLDERS - Servicios de aplicación (Fase 1)
# Se implementarán en próximos pasos
# ═══════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════
  # SERVICIOS DE APLICACIÓN (Fase 1)
  # ═══════════════════════════════════════════════════════════════

  auth-service:
    build:
      context: .
      dockerfile: apps/platform/auth-service/Dockerfile
    container_name: tnsvt-auth-service
    hostname: auth-service
    environment:
      AUTH_SERVICE_PORT: "8001"
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-tnsvt}
      POSTGRES_USER: ${POSTGRES_USER:-tnsvt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tnsvt}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me_min_32_chars_abc}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tnsvt-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-service.rule=Host(`api.localhost`) && PathPrefix(`/api/v1/auth`)"
      - "traefik.http.services.auth-service.loadbalancer.server.port=8001"

  # api-gateway:
  #   build: ./apps/gateway/api-gateway
  #   ...

# ═══════════════════════════════════════════════════════════════
# NOTAS
# ═══════════════════════════════════════════════════════════════
#
# Para usar GPU con Ollama:
#   - Instalar NVIDIA Container Toolkit
#   - Descomentar la sección "deploy.resources" de ollama
#
# Para escalar NATS a cluster:
#   - Agregar --cluster flag
#   - Configurar servidores adicionales
#
# Para producción:
#   - Cambiar todas las contraseñas
#   - Activar TLS en Traefik
#   - Configurar backups automáticos de postgres-data