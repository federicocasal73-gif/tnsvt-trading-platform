ai-core:
  build: ./ai-core
  container_name: tnsvt-ai-core
  restart: unless-stopped
  ports:
    - "8200:8200"
  environment:
    AI_CORE_ENV: ${AI_CORE_ENV:-development}
    AI_CORE_LOG_LEVEL: ${AI_CORE_LOG_LEVEL:-INFO}
    AI_CORE_POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
    AI_CORE_POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    AI_CORE_POSTGRES_DB: ${POSTGRES_DB:-tnsvt}
    AI_CORE_POSTGRES_USER: ${POSTGRES_USER:-tnsvt}
    AI_CORE_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tnsvt}
    AI_CORE_REDIS_HOST: ${REDIS_HOST:-redis}
    AI_CORE_REDIS_PORT: ${REDIS_PORT:-6379}
    AI_CORE_NATS_URL: ${NATS_URL:-nats://nats:4222}
    AI_CORE_OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    AI_CORE_OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    AI_CORE_OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats:
      condition: service_healthy
  networks:
    - tnsvt-network
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8200/health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s