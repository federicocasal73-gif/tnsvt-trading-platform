# Prometheus configuration for TNSVT V2
# Monitorea: Traefik, servicios Go/Python via exporters

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: tnsvt-v2-dev
    environment: development

# Alertmanager (Fase 2)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Load rules
rule_files:
  - "alerts/*.yml"

# Scrape configs
scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Traefik (API Gateway metrics)
  - job_name: traefik
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: /metrics

  # NATS monitoring
  - job_name: nats
    static_configs:
      - targets: ['nats:8222']
    metrics_path: /metrics

  # PostgreSQL exporter (Fase 2)
