groups:
  - name: tnsvt_infrastructure_alerts
    interval: 30s
    rules:
      # PostgreSQL
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL has been down for more than 1 minute"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 180
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connections near limit"
          description: "PostgreSQL has {{ $value }} active connections (limit: 200)"

      # Redis
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis has been down for more than 1 minute"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # NATS
      - alert: NATSDown
        expr: up{job="nats"} == 0
        for: 1m
        labels:
          severity: critical
          service: nats
        annotations:
          summary: "NATS is down"
          description: "NATS message broker is down"

      - alert: NATSHighConnections
        expr: nats_varz_connections > 8000
        for: 5m
        labels:
          severity: warning
          service: nats
        annotations:
          summary: "NATS connections high"
          description: "NATS has {{ $value }} active connections"

      # Traefik
      - alert: TraefikDown
        expr: up{job="traefik"} == 0
        for: 1m
        labels:
          severity: critical
          service: traefik
        annotations:
          summary: "Traefik API Gateway is down"

  - name: tnsvt_application_alerts
    interval: 30s
    rules:
      # Errores 5xx en API Gateway
      - alert: HighErrorRate
        expr: |
          sum(rate(traefik_entrypoint_requests_total{entrypoint="web",code=~"5.."}[5m]))
          / sum(rate(traefik_entrypoint_requests_total{entrypoint="web"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on API Gateway"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Latencia alta
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            rate(traefik_entrypoint_request_duration_seconds_bucket{entrypoint="web"}[5m])
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency"
          description: "p99 latency is {{ $value }}s (threshold: 1s)"